# 2. 單元測試 (Unit Test)
unit_tests:
  stage: test
  script:
    - 'dotnet test CompanyAPP/CompanyAPP.sln --filter Category!=Integration'

# 3. API 測試 (API Test)
api_tests:
  stage: api_test
  script:
    - echo "正在執行 API 整合測試 (驗證 Controllers 端點)..."
    - 'dotnet test CompanyAPP/CompanyAPP.sln --filter FullyQualifiedName~Controller'

# 4. SAST 靜態安全掃描 (SAST)
sast_scan:
  stage: security
  script:
    - echo "正在掃描 NuGet 套件漏洞與敏感資訊..."
    - 'dotnet list CompanyAPP/CompanyAPP.sln package --vulnerable'
    - 'grep -rE "password|secret|key|Token" CompanyAPP/ || exit 0'

# 5. 自動建立 Merge Request
create_mr:
  stage: automation
  image: curlimages/curl:7.85.0
  rules:
    - if: '$CI_COMMIT_BRANCH == "task/sdet-devops-flow"'
  script:
    - 'curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_PRIVATE_TOKEN}" "https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/merge_requests?source_branch=${CI_COMMIT_BRANCH}&target_branch=main&title=SDET_Final_Submission"'
